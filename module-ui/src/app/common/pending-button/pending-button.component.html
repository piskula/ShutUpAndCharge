<button [matButton]="type()" [disabled]="isLoading()" (click)="onClick.emit($event)" [class.hide-label]="isMobile()">
  @if (isLoading()) {
    <mat-spinner diameter="18" class="d-inline-flex v-text" [class.fix-spinner-position]="!isMobile()"></mat-spinner>
  } @else if (icon()) {
    <mat-icon>{{ icon() }}</mat-icon>
  }
  @if (!isMobile()) {
    <span>{{ label() }}</span>
  }
</button>
